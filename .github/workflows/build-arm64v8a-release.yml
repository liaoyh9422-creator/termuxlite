name: Build arm64-v8a Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-arm64v8a-release.yml'
      - 'app/**'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'termux-shared/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'

jobs:
  build-arm64-v8a-release:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build arm64-v8a release APK
        shell: bash {0}
        run: |
          exit_on_error() { echo "$1"; exit 1; }

          echo "Setting vars"
          CURRENT_VERSION_NAME_REGEX='\s+versionName "([^"]+)"$'
          CURRENT_VERSION_NAME="$(grep -m 1 -E "$CURRENT_VERSION_NAME_REGEX" ./app/build.gradle | sed -r "s/$CURRENT_VERSION_NAME_REGEX/\1/")"
          RELEASE_VERSION_NAME="v$CURRENT_VERSION_NAME+${GITHUB_SHA:0:7}"
          if ! printf "%s" "${RELEASE_VERSION_NAME/v/}" | grep -qP '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'; then
            exit_on_error "The versionName '${RELEASE_VERSION_NAME/v/}' is not a valid semantic version."
          fi

          APK_DIR_PATH="./app/build/outputs/apk/release"
          APK_VERSION_TAG="$RELEASE_VERSION_NAME-apt-android-7-github-release"
          APK_BASENAME_PREFIX="termux-app_$APK_VERSION_TAG"

          echo "APK_DIR_PATH=$APK_DIR_PATH" >> "$GITHUB_ENV"
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> "$GITHUB_ENV"
          echo "APK_BASENAME_PREFIX=$APK_BASENAME_PREFIX" >> "$GITHUB_ENV"

          export TERMUX_APP_VERSION_NAME="${RELEASE_VERSION_NAME/v/}"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"
          export TERMUX_PACKAGE_VARIANT="apt-android-7"
          export TERMUX_SPLIT_APKS_FOR_RELEASE_BUILDS="1"
          export TERMUX_USE_DEBUG_SIGNING_FOR_RELEASE="1"

          if ! ./gradlew :app:assembleRelease; then
            exit_on_error "Build failed for '$APK_VERSION_TAG' release build."
          fi

          ARM64_APK_PATH="$APK_DIR_PATH/${APK_BASENAME_PREFIX}_arm64-v8a.apk"
          if ! test -f "$ARM64_APK_PATH"; then
            files_found="$(ls -la "$APK_DIR_PATH" 2>/dev/null || true)"
            exit_on_error "Failed to find built APK at '$ARM64_APK_PATH'. Files found: "$'\n'"$files_found"
          fi

          if ! (cd "$APK_DIR_PATH"; sha256sum "${APK_BASENAME_PREFIX}_arm64-v8a.apk" > "${APK_BASENAME_PREFIX}_arm64-v8a.sha256"); then
            exit_on_error "Generating checksum failed for '$APK_VERSION_TAG'."
          fi

      - name: Upload arm64-v8a release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_arm64-v8a
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_arm64-v8a.apk
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_arm64-v8a.sha256
            ${{ env.APK_DIR_PATH }}/output-metadata.json
            app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error